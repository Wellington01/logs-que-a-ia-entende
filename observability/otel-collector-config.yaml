# OpenTelemetry Collector — o "carteiro universal".
# Recebe logs + traces da app via OTLP e roteia: trace -> Tempo, log -> Loki.
# Trocar de backend = trocar o exporter aqui, sem tocar na aplicação.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch: {}

exporters:
  # Traces -> Tempo (OTLP gRPC)
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Logs -> Loki (endpoint OTLP nativo do Loki 3.x)
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]
